<!DOCTYPE html>
<html>
    <head>
        <title>Personal Detail Form</title>
    </head>
<body>
    <h1> Personal Details Form</h1>
    <form>
        <label>Name</label><br>
        <input type="text" id="name"><br><br>
        <label>Email ID</label><br>
        <input type="text" id="email"><br><br>
        <label>Contact Number (This will be hidden)</label><br>
        <input type="password" id="contact"><br><br>
        <label>Gender</label><br>
        <input type="radio" id="female">female<br>
        <input type="radio" id="male">male<br><br>
        <label>Favourite city</label><br>
        <input type="checkbox" id="city" value="New Delhi">New Delhi<br>
        <input type="checkbox" id="city" value="Shanghai">Shanghai<br><br>
        <input type="submit">
    </form>
</body>
</html>
